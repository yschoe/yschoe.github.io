<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shacky Tale (Web Port)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      color: #eee;
      font-family: monospace;
      height: 100%;
    }
    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      gap: 10px;
      padding: 16px;
      box-sizing: border-box;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: min(96vw, 1152px);
      height: auto;
      border: 2px solid #666;
      background: #000;
      display: block;
    }
    .note {
      opacity: 0.9;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="720" height="348"></canvas>
    <div class="note">Controls: Arrows or numpad 8/4/6/2, A/Space then direction to attack, M map, Esc quit</div>
  </div>
  <script src="assets.js"></script>
  <script src="game.js"></script>
</body>
</html>
